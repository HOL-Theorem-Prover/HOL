[book]
title = "HOL: Reference"
authors = ["The HOL Development Team"]
language = "en"
# Source is the polyscripter-evaluated mirror of help/Docfiles,
# produced by help/src-sml/process_docfiles during bin/build's
# build_help step.  Each *.smd in the source tree is replaced by
# its evaluated counterpart here (same .smd extension; the
# evaluated `>>` directives have already been expanded).  The
# `--no-polyscripter` flag on smdpp below skips a redundant
# polyscripter pass for these pre-evaluated entries.
src = "../build/Docfiles-processed"
# `description` is read by Manual/Tools/gen_lander when generating
# the top-level Manual/book/index.html; mdbook itself ignores it.
description = "Per-entry reference for every HOL function, theorem, tactic, conversion, and theory."

[output.html]
mathjax-support = true
theme = "../theme"
additional-css = ["custom.css"]
# See Manual/Description/book.toml for the smart-punctuation
# rationale: pulldown-cmark smart-quotes straight `'` inside
# math blocks, which we don't want.
smart-punctuation = false
# Cross-book search; see Manual/Description/book.toml for the
# additional-js / symlink rationale.
additional-js = ["hol-searcher.js"]

# With 1,613 entries, the fold UX gets annoying (click-to-expand,
# click-elsewhere-doesn't-collapse, and per-state colour shifts
# make the sidebar feel inconsistent).  Disable folding entirely
# so every entry is always visible -- search and structure-group
# scrolling handle navigation.
[output.html.fold]
enable = false

[preprocessor.smdpp]
command = "../Tools/smdpp --no-polyscripter"
renderers = ["html"]

[build]
build-dir = "../book/Reference"
create-missing = false
