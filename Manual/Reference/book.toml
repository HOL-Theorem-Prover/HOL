[book]
title = "HOL: Reference"
authors = ["The HOL Development Team"]
language = "en"
# Source is the help/Docfiles directory itself: 1,613 entry .smd
# files plus a generated SUMMARY.md.  mdbook reads .smd via the
# smdpp preprocessor (same as Description and Tutorial).
src = "../../help/Docfiles"
# `description` is read by Manual/Tools/gen_lander when generating
# the top-level Manual/book/index.html; mdbook itself ignores it.
description = "Per-entry reference for every HOL function, theorem, tactic, conversion, and theory."

[output.html]
mathjax-support = true
theme = "../theme"
additional-css = ["custom.css"]

# With 1,613 entries, the fold UX gets annoying (click-to-expand,
# click-elsewhere-doesn't-collapse, and per-state colour shifts
# make the sidebar feel inconsistent).  Disable folding entirely
# so every entry is always visible -- search and structure-group
# scrolling handle navigation.
[output.html.fold]
enable = false

[preprocessor.smdpp]
command = "../Tools/smdpp"
renderers = ["html"]

[build]
build-dir = "../book/Reference"
create-missing = false
